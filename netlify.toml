# Netlify configuration for Hair Pinns

[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[dev]
  command = "npm run dev"
  port = 8888
  targetPort = 5173

[functions]
  directory = "netlify/functions"

# API route first so /api/checkout always hits the function (not the SPA)
[[redirects]]
  from = "/api/checkout"
  to = "/.netlify/functions/checkout"
  status = 200
  force = true

# Cart/checkout - proxy to Shopify (must be before SPA catch-all)
[[redirects]]
  from = "/cart/c/*"
  to = "https://femtat-zu.myshopify.com/cart/c/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/cart"
  to = "https://femtat-zu.myshopify.com/cart"
  status = 200
  force = true

# Sitemap - ensure XML is served (static file takes precedence; this is a fallback)
[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type = "application/xml"
    Cache-Control = "public, max-age=3600, must-revalidate"

# SPA routing - redirect all other routes to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Headers for security and performance
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

# Cache static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache images
[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000"
[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000"
[[headers]]
  for = "/*.webp"
  [headers.values]
    Cache-Control = "public, max-age=31536000"
[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

# Cache fonts
[[headers]]
  for = "/*.woff"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
[[headers]]
  for = "/*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Don't cache HTML
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Don't cache service worker
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Security headers for API routes (if using Netlify Functions)
[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Headers = "Content-Type"
    Access-Control-Allow-Methods = "GET, POST, OPTIONS"

# Environment Variables Documentation
# Set these in Netlify Dashboard → Site Settings → Environment Variables
# Required for checkout function:
#   - SHOPIFY_MYSHOPIFY_DOMAIN: Your Shopify store domain (e.g., femtat-zu.myshopify.com)
#   - SF_STOREFRONT_TOKEN: Your Shopify Storefront API access token
#   - SF_API_VERSION: Shopify API version (e.g., 2025-01)
# Optional:
#   - VITE_GHL_INBOUND_WEBHOOK_URL: GoHighLevel webhook URL for form submissions
#   - VITE_SHOP_DOMAIN: Your shop domain (e.g., hairpinns.com)

