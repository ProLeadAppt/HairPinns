# Netlify configuration for Hair Pinns

[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[dev]
  command = "npm run dev"
  port = 8888
  targetPort = 5173

[functions]
  directory = "netlify/functions"

# API route first so /api/checkout always hits the function (not the SPA)
[[redirects]]
  from = "/api/checkout"
  to = "/.netlify/functions/checkout"
  status = 200
  force = true

# Cart/checkout - proxy to Shopify (must be before SPA catch-all)
[[redirects]]
  from = "/cart/c/*"
  to = "https://femtat-zu.myshopify.com/cart/c/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/cart"
  to = "https://femtat-zu.myshopify.com/cart"
  status = 200
  force = true

# Discount links - redirect to Shopify so discount cookie gets set (must be before SPA catch-all)
[[redirects]]
  from = "/discount/*"
  to = "https://femtat-zu.myshopify.com/discount/:splat"
  status = 302
  force = true

# Sitemap - ensure XML is served (static file takes precedence; this is a fallback)
[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type = "application/xml"
    Cache-Control = "public, max-age=3600, must-revalidate"

# AI crawler discovery files (AEO/GEO)
[[headers]]
  for = "/llms.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/llms-full.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"
    Cache-Control = "public, max-age=86400"

# SPA routing - redirect all other routes to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Headers for security and performance
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    # microphone allowed for the LeadConnector Voice AI agent (chat widget).
    # geolocation/camera stay disabled since nothing on the site needs them.
    Permissions-Policy = "geolocation=(), microphone=(self \"https://*.leadconnectorhq.com\"), camera=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.googletagmanager.com https://www.google-analytics.com https://widget.reputationhub.com.au https://www.fresha.com https://*.leadconnectorhq.com https://www.clarity.ms https://*.clarity.ms https://*.vapi.ai https://*.daily.co; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://*.leadconnectorhq.com; font-src 'self' https://fonts.gstatic.com https://*.leadconnectorhq.com; img-src 'self' data: blob: https://cdn.shopify.com https://*.googleusercontent.com https://maps.googleapis.com https://maps.gstatic.com https://www.google.com https://www.google-analytics.com https://widget.reputationhub.com.au https://*.leadconnectorhq.com https://*.clarity.ms https://assets.cdn.filesafe.space https://*.filesafe.space https://storage.googleapis.com; frame-src https://www.fresha.com https://www.google.com https://maps.google.com https://widget.reputationhub.com.au https://*.leadconnectorhq.com https://*.vapi.ai https://*.daily.co; connect-src 'self' https://*.myshopify.com https://www.google-analytics.com https://www.googletagmanager.com https://widget.reputationhub.com.au https://*.leadconnectorhq.com wss://*.leadconnectorhq.com https://hooks.zapier.com https://www.clarity.ms https://*.clarity.ms https://*.filesafe.space https://*.vapi.ai wss://*.vapi.ai https://*.daily.co wss://*.daily.co; media-src 'self' blob: https://*.leadconnectorhq.com https://*.vapi.ai https://*.daily.co; worker-src 'self' blob:; child-src 'self' blob:"

# Cache static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache images
[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000"
[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000"
[[headers]]
  for = "/*.webp"
  [headers.values]
    Cache-Control = "public, max-age=31536000"
[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

# Cache fonts
[[headers]]
  for = "/*.woff"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
[[headers]]
  for = "/*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Don't cache HTML
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Don't cache service worker
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Security headers for API routes (if using Netlify Functions)
[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Headers = "Content-Type"
    Access-Control-Allow-Methods = "GET, POST, OPTIONS"

# Environment Variables Documentation
# Set these in Netlify Dashboard → Site Settings → Environment Variables
# Required for checkout function:
#   - SHOPIFY_MYSHOPIFY_DOMAIN: Your Shopify store domain (e.g., femtat-zu.myshopify.com)
#   - SF_STOREFRONT_TOKEN: Your Shopify Storefront API access token
#   - SF_API_VERSION: Shopify API version (e.g., 2025-01)
# Optional:
#   - VITE_GHL_INBOUND_WEBHOOK_URL: GoHighLevel webhook URL for form submissions
#   - VITE_SHOP_DOMAIN: Your shop domain (e.g., hairpinns.com)

