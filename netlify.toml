# Netlify configuration for Hair Pinns

[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[dev]
  command = "npm run dev"
  port = 8888
  targetPort = 5173

[functions]
  directory = "netlify/functions"

# API route first so /api/checkout always hits the function (not the SPA)
[[redirects]]
  from = "/api/checkout"
  to = "/.netlify/functions/checkout"
  status = 200
  force = true

# Cart/checkout - proxy to Shopify (must be before SPA catch-all)
[[redirects]]
  from = "/cart/c/*"
  to = "https://femtat-zu.myshopify.com/cart/c/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/cart"
  to = "https://femtat-zu.myshopify.com/cart"
  status = 200
  force = true

# Discount links - redirect to Shopify so discount cookie gets set (must be before SPA catch-all)
[[redirects]]
  from = "/discount/*"
  to = "https://femtat-zu.myshopify.com/discount/:splat"
  status = 302
  force = true

# Legacy /near/<slug> routes (the old suburb-page system) -> the canonical
# /areas/<slug>-<postcode> pages. Both code paths render today, but /areas/ is
# the fully-built, sitemap-indexed system. Routing requests at the edge prevents
# duplicate-content competition and consolidates SEO authority on /areas/.
[[redirects]]
  from = "/near/bangor"
  to = "/areas/bangor-2234"
  status = 301
  force = true
[[redirects]]
  from = "/near/menai"
  to = "/areas/menai-2234"
  status = 301
  force = true
[[redirects]]
  from = "/near/illawong"
  to = "/areas/illawong-2234"
  status = 301
  force = true
[[redirects]]
  from = "/near/alfords-point"
  to = "/areas/alfords-point-2234"
  status = 301
  force = true
[[redirects]]
  from = "/near/sutherland"
  to = "/areas/sutherland-2232"
  status = 301
  force = true
[[redirects]]
  from = "/near/kirrawee"
  to = "/areas/kirrawee-2232"
  status = 301
  force = true
[[redirects]]
  from = "/near/kareela"
  to = "/areas/kareela-2232"
  status = 301
  force = true
[[redirects]]
  from = "/near/como"
  to = "/areas/como-2226"
  status = 301
  force = true
[[redirects]]
  from = "/near/gymea"
  to = "/areas/gymea-2227"
  status = 301
  force = true
[[redirects]]
  from = "/near/miranda"
  to = "/areas/miranda-2228"
  status = 301
  force = true
[[redirects]]
  from = "/near/cronulla"
  to = "/areas/cronulla-2230"
  status = 301
  force = true
# Suburbs with no matching /areas/ entry (woronora, engadine, heathcote) fall
# through to the /areas index — better than a 404 on a stale link.
[[redirects]]
  from = "/near/*"
  to = "/areas"
  status = 301
  force = true

# Legacy Shopify blog URL slug mismatches -> canonical React routes.
# These must come BEFORE the /blogs/blogs/* wildcard so the specific match wins.
# Bing had these long-form/punctuated slugs indexed and they don't map 1:1 to current slugs.
[[redirects]]
  from = "/blogs/blogs/the-truth-about-shampoo-after-straight-up-treatment-what-i-really-want-you-to-know"
  to = "/blog/truth-about-shampoo-after-straight-up-treatment"
  status = 301
  force = true

[[redirects]]
  from = "/blogs/blogs/qiqi-vega-vs-nanoplasty-what-s-the-difference"
  to = "/blog/qiqi-vega-vs-nanoplasty-whats-the-difference"
  status = 301
  force = true

[[redirects]]
  from = "/blogs/blogs/welcome-to-a-new-version-of-hair-pinns"
  to = "/blog"
  status = 301
  force = true

# Legacy Shopify tag/atom blog URLs - no tag pages exist on the React site, so
# everything under /blogs/blogs/tagged/* (including .atom feeds and ?page=N
# paginated variants) folds back to the blog index. Must come BEFORE the
# /blogs/blogs/* catch-all so this more-specific match wins.
[[redirects]]
  from = "/blogs/blogs/tagged/*"
  to = "/blog"
  status = 301
  force = true

# Bare /blogs/blogs (and its ?page=N variants - query is preserved but ignored
# by the target). The /blogs/blogs/* rule below requires at least one trailing
# segment, so this exact-match rule covers the bare URL.
[[redirects]]
  from = "/blogs/blogs"
  to = "/blog"
  status = 301
  force = true

# Legacy Shopify blog URL pattern -> current React route
# Bing/Google had `/blogs/blogs/<slug>` indexed from the old Shopify storefront.
# Without this redirect, the SPA serves index.html with no H1 to non-JS crawlers.
[[redirects]]
  from = "/blogs/blogs/*"
  to = "/blog/:splat"
  status = 301
  force = true

# Catch any other legacy Shopify blog handles (e.g. /blogs/news/<slug>) -> /blog/<slug>
[[redirects]]
  from = "/blogs/*/:slug"
  to = "/blog/:slug"
  status = 301
  force = true

# Discontinued product handles -> closest-fit collection (recover backlink equity)
[[redirects]]
  from = "/products/juuce-fibre-goo-sumo-grip"
  to = "/collections/hair-styling-products"
  status = 301
  force = true

# Legacy Shopify collection-prefixed product URLs.
# Old storefront indexed /collections/<collection>/products/<handle> alongside
# the canonical /products/<handle>. Search Console flagged 50+ of these as
# noindexed; 301 to the canonical recovers any backlink equity pointing at the
# Shopify-era URL.
[[redirects]]
  from = "/collections/:collection/products/:handle"
  to = "/products/:handle"
  status = 301
  force = true

# Legacy Shopify static pages (/pages/<slug>) -> current React routes.
# Specific mappings first, then a catch-all for any other historic /pages/ URL.
[[redirects]]
  from = "/pages/about-us"
  to = "/about"
  status = 301
  force = true

[[redirects]]
  from = "/pages/contact"
  to = "/contact"
  status = 301
  force = true

[[redirects]]
  from = "/pages/price-list"
  to = "/services"
  status = 301
  force = true

[[redirects]]
  from = "/pages/*"
  to = "/"
  status = 301
  force = true

# Legacy Shopify policy URLs -> current /policies routes.
[[redirects]]
  from = "/policies/refund-policy"
  to = "/policies/returns"
  status = 301
  force = true

[[redirects]]
  from = "/policies/shipping-policy"
  to = "/policies/shipping"
  status = 301
  force = true

# Legacy /shop entry point (Shopify default) -> collections index.
[[redirects]]
  from = "/shop"
  to = "/collections"
  status = 301
  force = true

[[redirects]]
  from = "/shop/"
  to = "/collections"
  status = 301
  force = true

# Sitemap - ensure XML is served (static file takes precedence; this is a fallback)
[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type = "application/xml"
    Cache-Control = "public, max-age=3600, must-revalidate"

# AI crawler discovery files (AEO/GEO)
[[headers]]
  for = "/llms.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/llms-full.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/llms.json"
  [headers.values]
    Content-Type = "application/json; charset=utf-8"
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/llm.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/ai.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/humans.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/hero-reel.mp4"
  [headers.values]
    Content-Type = "video/mp4"
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "/hero-poster.avif"
  [headers.values]
    Content-Type = "image/avif"
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "/assets/images/trio/*.svg"
  [headers.values]
    Content-Type = "image/svg+xml"
    Cache-Control = "public, max-age=2592000"

# SPA routing - redirect all other routes to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Headers for security and performance
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    # microphone allowed for the LeadConnector Voice AI agent (chat widget).
    # geolocation/camera stay disabled since nothing on the site needs them.
    Permissions-Policy = "geolocation=(), microphone=(self \"https://*.leadconnectorhq.com\"), camera=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' data: https://www.googletagmanager.com https://www.google-analytics.com https://widget.reputationhub.com.au https://www.fresha.com https://*.leadconnectorhq.com https://services.msgsndr.com https://*.msgsndr.com https://www.clarity.ms https://*.clarity.ms https://*.livekit.cloud https://www.google.com/recaptcha/ https://www.gstatic.com/recaptcha/ https://sa.searchatlas.com https://dashboard.searchatlas.com https://challenges.cloudflare.com https://cdn.socket.io; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://*.leadconnectorhq.com https://fonts.bunny.net; style-src-elem 'self' 'unsafe-inline' https://fonts.googleapis.com https://*.leadconnectorhq.com https://fonts.bunny.net; font-src 'self' data: https://fonts.gstatic.com https://*.leadconnectorhq.com https://fonts.bunny.net; img-src 'self' data: blob: https://cdn.shopify.com https://*.googleusercontent.com https://maps.googleapis.com https://maps.gstatic.com https://www.google.com https://www.google-analytics.com https://widget.reputationhub.com.au https://*.leadconnectorhq.com https://*.clarity.ms https://assets.cdn.filesafe.space https://*.filesafe.space https://storage.googleapis.com https://c.bing.com; frame-src https://www.fresha.com https://www.google.com https://maps.google.com https://widget.reputationhub.com.au https://*.leadconnectorhq.com https://*.livekit.cloud https://www.google.com/recaptcha/ https://challenges.cloudflare.com; connect-src 'self' https://*.myshopify.com https://www.google-analytics.com https://www.googletagmanager.com https://widget.reputationhub.com.au https://*.leadconnectorhq.com wss://*.leadconnectorhq.com https://services.msgsndr.com https://*.msgsndr.com https://hooks.zapier.com https://www.clarity.ms https://*.clarity.ms https://*.filesafe.space https://*.livekit.cloud wss://*.livekit.cloud https://sa.searchatlas.com https://www.google.com; media-src 'self' blob: https://*.leadconnectorhq.com https://*.livekit.cloud; worker-src 'self' blob:; child-src 'self' blob:"

# Service worker must never be cached — browsers should always fetch the
# latest version so the kill-switch SW reaches users on next page load.
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Service-Worker-Allowed = "/"

# Cache static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache images
[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000"
[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000"
[[headers]]
  for = "/*.webp"
  [headers.values]
    Cache-Control = "public, max-age=31536000"
[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

# Cache fonts
[[headers]]
  for = "/*.woff"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
[[headers]]
  for = "/*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Don't cache HTML
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Don't cache service worker
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Security headers for API routes (if using Netlify Functions)
[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Headers = "Content-Type"
    Access-Control-Allow-Methods = "GET, POST, OPTIONS"

# Environment Variables Documentation
# Set these in Netlify Dashboard → Site Settings → Environment Variables
# Required for checkout function:
#   - SHOPIFY_MYSHOPIFY_DOMAIN: Your Shopify store domain (e.g., femtat-zu.myshopify.com)
#   - SF_STOREFRONT_TOKEN: Your Shopify Storefront API access token
#   - SF_API_VERSION: Shopify API version (e.g., 2025-01)
# Optional:
#   - VITE_GHL_INBOUND_WEBHOOK_URL: GoHighLevel webhook URL for form submissions
#   - VITE_SHOP_DOMAIN: Your shop domain (e.g., hairpinns.com)

