<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800" role="img" aria-label="QIQI Bare Repair Oil — Jena's Daily Trio leave-in">
  <defs>
    <linearGradient id="bg-treat" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1f4d5c"/>
      <stop offset="100%" stop-color="#0f2e38"/>
    </linearGradient>
    <linearGradient id="bottle-treat" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fce8c8"/>
      <stop offset="100%" stop-color="#e8b665"/>
    </linearGradient>
    <linearGradient id="oil-sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="800" height="800" fill="url(#bg-treat)"/>

  <!-- soft halo -->
  <circle cx="400" cy="440" r="290" fill="#ffd98a" opacity="0.12"/>

  <!-- shadow -->
  <ellipse cx="400" cy="700" rx="160" ry="16" fill="#000" opacity="0.35"/>

  <!-- slim dropper bottle body -->
  <path d="M 340 280 Q 340 260 360 260 L 440 260 Q 460 260 460 280 L 460 660 Q 460 680 440 680 L 360 680 Q 340 680 340 660 Z" fill="url(#bottle-treat)"/>

  <!-- dropper cap -->
  <rect x="370" y="180" width="60" height="80" fill="#0f2e38"/>
  <rect x="380" y="140" width="40" height="44" rx="4" fill="#1f4d5c"/>

  <!-- bottle shine -->
  <rect x="356" y="280" width="20" height="390" rx="10" fill="url(#oil-sheen)"/>

  <!-- label -->
  <rect x="350" y="380" width="100" height="200" rx="6" fill="#fff" opacity="0.95"/>
  <text x="400" y="425" font-family="Georgia, serif" font-size="22" font-weight="700" text-anchor="middle" fill="#0f2e38">QIQI</text>
  <line x1="370" y1="445" x2="430" y2="445" stroke="#c9a35a" stroke-width="1.5"/>
  <text x="400" y="470" font-family="Georgia, serif" font-size="11" text-anchor="middle" fill="#1f4d5c">BARE REPAIR</text>
  <text x="400" y="500" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#0f2e38">OIL</text>
  <text x="400" y="540" font-family="sans-serif" font-size="9" text-anchor="middle" fill="#1f4d5c">— Jena's pick —</text>

  <!-- treatment emoji (sparkle) -->
  <text x="400" y="630" font-size="80" text-anchor="middle" aria-hidden="true">✨</text>

  <!-- corner ribbon -->
  <text x="60" y="60" font-family="sans-serif" font-size="16" font-weight="700" fill="#ffd98a" letter-spacing="2">THE LEAVE-IN</text>
  <text x="60" y="82" font-family="sans-serif" font-size="11" fill="#f5e6c8" opacity="0.7">Jena's Daily Trio · 3 of 3</text>
</svg>
