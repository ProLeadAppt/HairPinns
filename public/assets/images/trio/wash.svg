<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800" role="img" aria-label="Juuce Bond Repair Shampoo — Jena's Daily Trio wash">
  <defs>
    <linearGradient id="bg-wash" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1f4d5c"/>
      <stop offset="100%" stop-color="#0f2e38"/>
    </linearGradient>
    <linearGradient id="bottle-wash" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5e6c8"/>
      <stop offset="100%" stop-color="#c9a35a"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="800" height="800" fill="url(#bg-wash)"/>

  <!-- soft halo -->
  <circle cx="400" cy="400" r="320" fill="#c9a35a" opacity="0.08"/>

  <!-- shadow -->
  <ellipse cx="400" cy="700" rx="180" ry="18" fill="#000" opacity="0.35"/>

  <!-- bottle body -->
  <rect x="300" y="200" width="200" height="480" rx="20" fill="url(#bottle-wash)"/>

  <!-- bottle shine -->
  <rect x="312" y="210" width="22" height="460" rx="11" fill="url(#shine)"/>

  <!-- bottle cap -->
  <rect x="330" y="120" width="140" height="90" rx="14" fill="#0f2e38"/>
  <rect x="330" y="120" width="140" height="14" rx="6" fill="#1f4d5c"/>

  <!-- label -->
  <rect x="320" y="320" width="160" height="220" rx="8" fill="#fff" opacity="0.96"/>
  <text x="400" y="370" font-family="Georgia, serif" font-size="20" font-weight="700" text-anchor="middle" fill="#0f2e38">JUUCE</text>
  <text x="400" y="400" font-family="Georgia, serif" font-size="13" text-anchor="middle" fill="#1f4d5c">BOND REPAIR</text>
  <line x1="340" y1="420" x2="460" y2="420" stroke="#c9a35a" stroke-width="1.5"/>
  <text x="400" y="450" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#0f2e38">SHAMPOO</text>
  <text x="400" y="500" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#1f4d5c">— Jena's pick —</text>

  <!-- wash emoji (replaces image of bubbles) -->
  <text x="400" y="610" font-size="80" text-anchor="middle" aria-hidden="true">🧴</text>

  <!-- corner ribbon -->
  <text x="60" y="60" font-family="sans-serif" font-size="16" font-weight="700" fill="#c9a35a" letter-spacing="2">THE WASH</text>
  <text x="60" y="82" font-family="sans-serif" font-size="11" fill="#f5e6c8" opacity="0.7">Jena's Daily Trio · 1 of 3</text>
</svg>
