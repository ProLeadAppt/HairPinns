<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800" role="img" aria-label="Aromaganic Smooth Conditioner — Jena's Daily Trio condition">
  <defs>
    <linearGradient id="bg-cond" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1f4d5c"/>
      <stop offset="100%" stop-color="#0f2e38"/>
    </linearGradient>
    <linearGradient id="bottle-cond" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#d8e6ea"/>
    </linearGradient>
    <linearGradient id="shine-cond" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="800" height="800" fill="url(#bg-cond)"/>

  <!-- soft halo -->
  <circle cx="400" cy="420" r="300" fill="#7eb6c8" opacity="0.10"/>

  <!-- shadow -->
  <ellipse cx="400" cy="700" rx="180" ry="18" fill="#000" opacity="0.35"/>

  <!-- bottle body (slightly different shape — pump bottle) -->
  <path d="M 300 240 Q 300 220 320 220 L 480 220 Q 500 220 500 240 L 500 660 Q 500 680 480 680 L 320 680 Q 300 680 300 660 Z" fill="url(#bottle-cond)"/>

  <!-- pump neck -->
  <rect x="380" y="160" width="40" height="60" fill="#c9a35a"/>
  <rect x="350" y="130" width="100" height="36" rx="6" fill="#0f2e38"/>
  <rect x="430" y="142" width="40" height="14" rx="3" fill="#1f4d5c"/>

  <!-- bottle shine -->
  <rect x="316" y="240" width="22" height="430" rx="11" fill="url(#shine-cond)"/>

  <!-- label -->
  <rect x="320" y="350" width="160" height="220" rx="8" fill="#fff"/>
  <text x="400" y="395" font-family="Georgia, serif" font-size="18" font-weight="700" text-anchor="middle" fill="#0f2e38">AROMAGANIC</text>
  <text x="400" y="422" font-family="Georgia, serif" font-size="11" text-anchor="middle" fill="#1f4d5c">SMOOTH HAIR</text>
  <line x1="340" y1="442" x2="460" y2="442" stroke="#c9a35a" stroke-width="1.5"/>
  <text x="400" y="470" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#0f2e38">CONDITIONER</text>
  <text x="400" y="520" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#1f4d5c">— Jena's pick —</text>

  <!-- condition emoji -->
  <text x="400" y="630" font-size="80" text-anchor="middle" aria-hidden="true">💧</text>

  <!-- corner ribbon -->
  <text x="60" y="60" font-family="sans-serif" font-size="16" font-weight="700" fill="#7eb6c8" letter-spacing="2">THE CONDITION</text>
  <text x="60" y="82" font-family="sans-serif" font-size="11" fill="#f5e6c8" opacity="0.7">Jena's Daily Trio · 2 of 3</text>
</svg>
