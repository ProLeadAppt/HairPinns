<!doctype html>
<html lang="en-AU">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- NOTE: Page-specific title, description, og:*, twitter:*, and canonical tags are set by SEOHead component on each page -->
    <!-- NOTE: Do NOT add them here as they will duplicate page-level tags and confuse search engines -->
    <meta name="author" content="Hair Pinns Salon" />
    <meta name="theme-color" content="#8B4A8B" />
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Performance: Preconnect to external domains -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdn.shopify.com" crossorigin>
    <link rel="preconnect" href="https://www.fresha.com" crossorigin>

    <!-- Preload the hero poster so it's in flight before the React bundle parses — biggest LCP win on the home page. -->
    <link rel="preload" as="image" href="/hero-poster.avif" type="image/avif" fetchpriority="high">
    
    <!-- Performance: Preload critical fonts -->
    <!-- (Preload removed because it conflicts with Google Fonts dynamic woff2 URLs) -->
    
    <!-- Fonts with font-display: swap -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <link rel="icon" type="image/png" href="/brand-favicon.png">
    <link rel="sitemap" type="application/xml" title="Sitemap" href="https://hairpinns.com/sitemap.xml">

    <!-- GA4 is loaded via the React TrackingScripts component (env-gated, deferred). -->
