<!doctype html>
<html lang="en-AU">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- NOTE: Page-specific title, description, og:*, twitter:*, and canonical tags are set by SEOHead component on each page -->
    <!-- NOTE: Do NOT add them here as they will duplicate page-level tags and confuse search engines -->
    <meta name="author" content="Hair Pinns Salon" />
    <meta name="theme-color" content="#8B4A8B" />
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Performance: Preconnect to external domains -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdn.shopify.com" crossorigin>
    <link rel="preconnect" href="https://www.fresha.com" crossorigin>

    <!-- Preload the hero poster so it's in flight before the React bundle parses — biggest LCP win on the home page. -->
    <link rel="preload" as="image" href="/hero-poster.avif" type="image/avif" fetchpriority="high">
    
    <!-- Performance: Preload critical fonts -->
    <!-- (Preload removed because it conflicts with Google Fonts dynamic woff2 URLs) -->
    
    <!-- Fonts with font-display: swap.
         Fraunces is a variable display serif with true italics — used for the
         brand tagline ("Hair care from someone who actually does hair.") and
         large editorial pull-quotes. Playfair Display is kept for h1–h6 to
         avoid a system-wide CLS swap on body text. -->
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,500&family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <link rel="icon" type="image/png" href="/brand-favicon.png">
    <link rel="sitemap" type="application/xml" title="Sitemap" href="https://hairpinns.com/sitemap.xml">

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-N6Y1TJMWGG"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-N6Y1TJMWGG');
    </script>

    <!-- SearchAtlas dynamic-optimization loader only on production hosts. -->
    <script>
      (() => {
        const host = window.location.hostname;
        if (!(host === 'hairpinns.com' || host === 'www.hairpinns.com' || host.endsWith('.vercel.app'))) return;
        const script = document.createElement('script');
        script.defer = true;
        script.setAttribute('nowprocket', '');
        script.setAttribute('nitro-exclude', '');
        script.type = 'text/javascript';
        script.id = 'sa-dynamic-optimization';
        script.dataset.uuid = '50e2273d-d5b2-4ec0-aec8-437be544c65c';
        script.src = 'https://dashboard.searchatlas.com/scripts/dynamic_optimization.js';
        document.head.appendChild(script);
      })();
    </script>
  </head>

  <body>
    <a href="#main-content" class="skip-link">Skip to main content</a>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

  </body>
</html>
